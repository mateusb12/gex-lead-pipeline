services:
  api:
    build: .
    container_name: gex-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: gex
      MYSQL_PASSWORD: gex
      MYSQL_DATABASE: gex_pipeline
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    container_name: gex-worker
    command: python -m app.worker
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: gex
      MYSQL_PASSWORD: gex
      MYSQL_DATABASE: gex_pipeline
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sms-distributor:
    build: .
    container_name: gex-sms-distributor
    command: python -m app.sms_distributor
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: gex
      MYSQL_PASSWORD: gex
      MYSQL_DATABASE: gex_pipeline
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: gex-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gex_pipeline
      MYSQL_USER: gex
      MYSQL_PASSWORD: gex
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugex", "-pgex"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gex-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
